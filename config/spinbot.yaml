# 自动洗稿模块配置

# 每日改写数量
daily_limit: 5

# 文章筛选
filter:
  min_score: 6
  target_types:
    - "AI工具介绍"
    - "AI使用教程"
    - "AI实操指南"
    - "AI产品评测"
    - "提示词技巧"
    - "开源项目介绍"
    - "模型使用方法"
    - "技术博客"
  exclude_types:
    - "融资新闻"
    - "政策法规"
    - "人事变动"
    - "财报数据"
    - "纯新闻快讯"

# 改写配置
rewrite:
  intensity: heavy
  add_intro: true
  add_summary: true
  min_length: 800
  max_length: 5000
  # 非中文内容翻译为中文
  translate_to_zh: true

# 发布
publish:
  zsxq: true
  hugo: true
  hugo_dir: "blog"
  interval_minutes: 30

# 数据源（全部海外站点）
sources:
  # ===== AI教程/工具评测 =====
  - name: "MarkTechPost"
    url: "https://www.marktechpost.com/"
    url_pattern: "marktechpost\\.com/\\d+/\\d+/\\d+/"
    max_scan: 8

  - name: "The Decoder"
    url: "https://the-decoder.com/"
    url_pattern: "the-decoder\\.com/[a-z0-9][a-z0-9-]+[a-z0-9]/"
    max_scan: 8

  - name: "Unite.AI"
    url: "https://www.unite.ai/"
    url_pattern: "unite\\.ai/[a-z0-9][a-z0-9-]+/"
    max_scan: 8

  - name: "Superhuman AI"
    url: "https://www.superhuman.ai/"
    url_pattern: "superhuman\\.ai/p/[a-z0-9-]+"
    max_scan: 5

  - name: "Future Tools"
    url: "https://www.futuretools.io/news"
    url_pattern: "futuretools\\.io/news/[a-z0-9-]+"
    max_scan: 5

  # ===== AI Newsletter/博客 =====
  - name: "The Rundown AI"
    url: "https://www.therundown.ai/"
    url_pattern: "therundown\\.ai/p/[a-z0-9-]+"
    max_scan: 5

  - name: "DeepLearning.AI Batch"
    url: "https://www.deeplearning.ai/the-batch/"
    url_pattern: "deeplearning\\.ai/the-batch/issue-\\d+/"
    max_scan: 3

  - name: "The AI Edge"
    url: "https://newsletter.theaiedge.io/"
    url_pattern: "theaiedge\\.io/p/[a-z0-9-]+"
    max_scan: 5

  - name: "Simon Willison"
    url: "https://simonwillison.net/tags/ai/"
    url_pattern: "simonwillison\\.net/\\d+/"
    max_scan: 5

  - name: "Lilian Weng"
    url: "https://lilianweng.github.io/"
    url_pattern: "lilianweng\\.github\\.io/posts/"
    max_scan: 3

  # ===== 官方博客 =====
  - name: "OpenAI Blog"
    url: "https://openai.com/blog"
    url_pattern: "openai\\.com/index/[a-z0-9-]+"
    max_scan: 5

  - name: "Anthropic"
    url: "https://www.anthropic.com/news"
    url_pattern: "anthropic\\.com/news/[a-z0-9-]+"
    max_scan: 5

  - name: "Meta AI Blog"
    url: "https://ai.meta.com/blog/"
    url_pattern: "ai\\.meta\\.com/blog/[a-z0-9-]+/"
    max_scan: 5

  - name: "Google AI Blog"
    url: "https://blog.google/technology/ai/"
    url_pattern: "blog\\.google/technology/ai/"
    max_scan: 5

  # ===== 开发者/技术教程 =====
  - name: "LangChain Blog"
    url: "https://blog.langchain.dev/"
    url_pattern: "blog\\.langchain\\.dev/[a-z0-9-]+/"
    max_scan: 5

  - name: "HuggingFace Blog"
    url: "https://huggingface.co/blog"
    url_pattern: "huggingface\\.co/blog/[a-z0-9-]+"
    max_scan: 5

  - name: "PyTorch Blog"
    url: "https://pytorch.org/blog/"
    url_pattern: "pytorch\\.org/blog/[a-z0-9-]+/"
    max_scan: 3

  - name: "Medium AI"
    url: "https://medium.com/tag/artificial-intelligence/recommended"
    url_pattern: "medium\\.com/"
    max_scan: 8

  - name: "Towards Data Science"
    url: "https://towardsdatascience.com/"
    url_pattern: "towardsdatascience\\.com/[a-z0-9-]+"
    max_scan: 5

  # ===== 社区 =====
  - name: "Reddit AI"
    url: "https://www.reddit.com/r/artificial/hot/"
    max_scan: 0

  - name: "Hacker News AI"
    url: "https://hn.algolia.com/?dateRange=last24h&page=0&prefix=true&query=AI&sort=byPopularity&type=story"
    max_scan: 0

  # ===== 论文 =====
  - name: "HuggingFace Papers"
    url: "https://huggingface.co/papers"
    max_scan: 0

  - name: "arXiv cs.AI"
    url: "https://arxiv.org/list/cs.AI/recent"
    max_scan: 0
