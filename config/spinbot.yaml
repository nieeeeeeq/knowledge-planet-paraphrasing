# 自动洗稿模块配置

# 每日改写数量
daily_limit: 5

# 文章筛选
filter:
  min_score: 6
  target_types:
    - "AI工具介绍"
    - "AI使用教程"
    - "AI实操指南"
    - "AI产品评测"
    - "提示词技巧"
    - "开源项目介绍"
    - "模型使用方法"
    - "技术博客"
  exclude_types:
    - "融资新闻"
    - "政策法规"
    - "人事变动"
    - "财报数据"
    - "纯新闻快讯"

# 改写配置
rewrite:
  intensity: heavy
  add_intro: true
  add_summary: true
  min_length: 800
  max_length: 5000
  translate_to_zh: true

# 发布
publish:
  zsxq: true
  hugo: true
  hugo_dir: "blog"
  interval_minutes: 30

# 数据源（全部海外教程类站点）
sources:
  # ===== AI教程平台 =====
  - name: "DataCamp Tutorial"
    url: "https://www.datacamp.com/tutorial"
    url_pattern: "datacamp\\.com/tutorial/[a-z0-9-]+"
    max_scan: 8

  - name: "Learn Prompting"
    url: "https://learnprompting.org/blog"
    url_pattern: "learnprompting\\.org/blog/[a-z0-9-]+"
    max_scan: 8

  - name: "freeCodeCamp AI"
    url: "https://www.freecodecamp.org/news/tag/ai/"
    url_pattern: "freecodecamp\\.org/news/[a-z0-9-]+/"
    max_scan: 8

