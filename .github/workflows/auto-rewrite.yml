name: Auto Rewrite

on:
  schedule:
    # 每6小时执行一次
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  auto-rewrite:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run auto rewrite
        working-directory: scripts
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZSXQ_COOKIE: ${{ secrets.ZSXQ_COOKIE }}
          ZSXQ_GROUP_ID: ${{ secrets.ZSXQ_GROUP_ID }}
        run: npx tsx auto-rewrite.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ config/processed.json
          git diff --staged --quiet || git commit -m "Auto rewrite $(date +%Y-%m-%d-%H%M)"
          git push
